{{- if .Values.apigwSync.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.names.fullname" . }}-apigw-sync-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
spec:
  backoffLimit: 50
  activeDeadlineSeconds: 7200
  template:
    metadata:
      labels: {{- include "common.labels.standard" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apigw-sync
          image: {{ default .Values.global.imageRegistry .Values.image.registry }}/{{ .Values.apigwSync.image.repository }}:v{{ default .Values.image.tag .Values.apigwSync.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | quote }}
          command: ["/data/bin/sync-apigateway.sh"]
          env:
            - name: BK_APIGW_NAME
              value: {{ .Values.apigwSync.apigwName }}
            - name: BK_API_URL_TMPL
              value: {{ .Values.apigwSync.bkApiUrlTmpl | required ".Values.apigwSync.bkApiUrlTmpl is required" }}
            - name: BK_APP_CODE
              value: {{ .Values.appCode }}
            - name: BK_APP_SECRET
              value: {{ .Values.appSecret }}
            - name: BK_APP_TENANT_ID
              value: {{ .Values.tenant.enabled | ternary "system" "default" | quote }}
            - name: BK_HCM_STAGE_NAME
              value: {{ .Values.apigwSync.stageName }}
            {{- if .Values.ingress.shareDomainEnable }}
            - name: BK_HCM_HOST
              value: {{ printf "%s://%s" .Values.global.bkDomainScheme .Values.ingress.host }}
            - name: BK_HCM_API_URL_PATH_PREFIX
              value: "apigw/"
            {{- else}}
            - name: BK_HCM_HOST
              value: {{ printf "%s://%s" .Values.global.bkDomainScheme .Values.ingress.apiserver.host }}
            - name: BK_HCM_API_URL_PATH_PREFIX
              value: ""
            {{- end }}
            - name: BK_HCM_MAINTAINER
              value: "{{ .Values.apigwSync.maintainer }}"
          resources: {{ toYaml .Values.apigwSync.resources | nindent 12 }}
{{- end }}
